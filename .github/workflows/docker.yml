name: Docker image

# Build the hostable MCP server image and push it to Docker Hub (and GHCR as a free
# mirror). On every push to main -> :latest (+ :main-<sha>). On a v* tag -> :<version>.
# Users pull  docker.io/<DOCKERHUB_USERNAME>/agent-mail:latest.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub account/namespace
#   DOCKERHUB_TOKEN     a Docker Hub access token (hub.docker.com -> Account
#                       Settings -> Security -> New Access Token, Read/Write)

on:
  push:
    branches: ["main"]
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # for the GHCR mirror
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git-describe version

      - name: Compute version (hatch-vcs style)
        id: version
        run: echo "value=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/agent-mail
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
