name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]  # so a release tag is gated by the same suite before its image builds
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Version-agnostic gates run once, on the primary Python. Style and types do not
  # differ across 3.12/3.13, so running them in the matrix would only multiply the ways
  # they can flake. pyright needs the clients extra installed (see below); pytest does
  # not, which is why they are separate jobs.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for hatch-vcs version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (with the clients extra, for pyright)
        # `--extra clients` matters: mcp_client.py imports `mcp`, which lives in the
        # clients extra, not the dev group. Without it pyright cannot resolve the import
        # and fails on code that is fine — the hub image omits these deps deliberately
        # (ADR 0009), but the type check covers the whole source tree.
        run: uv sync --python 3.12 --dev --extra clients

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests

      - name: Type check (pyright)
        # Pinned to the exact version the project's gate uses, and run via `uv run` so it
        # analyses the project venv (where mcp is installed) rather than an isolated one.
        run: uv run --with pyright==1.1.411 pyright src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for hatch-vcs version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        # No clients extra here: no test imports mcp, and mcp's Python support need not
        # constrain the versions the core is tested on.
        run: uv sync --python ${{ matrix.python-version }} --dev

      - name: Tests (pytest)
        run: uv run pytest

  # Live smoke: build the real image, run the deploy topology (hub + console sidecar),
  # and hit it over HTTP. This catches what the unit suite structurally cannot — that the
  # image starts, the ASGI server serves, the routes are wired into the app that ships,
  # and the console can reach the hub. Every past live break was of exactly this shape
  # and passed every unit test. Because the release build (docker.yml) only fires after
  # CI is green, this gates the release on the stack actually working.
  smoke:
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build the image (single-arch, for speed)
        # Tagged as the name compose expects, so `compose up` uses this local build
        # rather than pulling. VERSION is cosmetic here; the smoke test does not assert
        # on it.
        run: docker build --build-arg VERSION=0.0.0 -t salimfadhley/agent-mailbox:latest .

      - name: Launch the stack (hub + console sidecar)
        env:
          AGENT_MAILBOX_PUBLIC_URL: http://localhost:8080
        run: docker compose up -d

      - name: Wait for the hub to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "hub is up"; exit 0
            fi
            sleep 2
          done
          echo "::error::the hub did not become healthy in 60s"
          docker compose ps
          docker compose logs
          exit 1

      - name: Wait for the console
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8082/ >/dev/null 2>&1; then
              echo "console is up"; exit 0
            fi
            sleep 2
          done
          echo "::error::the console did not answer in 40s"
          docker compose logs console
          exit 1

      - name: Run the live smoke tests
        env:
          LIVE_HUB_URL: http://localhost:8080
          LIVE_CONSOLE_URL: http://localhost:8082
        run: uv run pytest tests/live -v

      - name: Stack logs (always, for debugging a failure)
        if: always()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  build:
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
