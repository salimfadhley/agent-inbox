name: Release

# On a v* tag: build the Python distributions and, if opted in, publish to PyPI.
#
# The Docker image is the artifact you deploy — see docker.yml, which builds :X.Y.Z +
# :latest on the same tag. This workflow is about PyPI, which is optional for an
# experimental tool and OFF by default so a tag never fails for want of PyPI setup.
#
# To turn PyPI publishing on:
#   1. Repo -> Settings -> Secrets and variables -> Actions -> Variables:
#        add PUBLISH_PYPI = true
#   2. One-time Trusted Publishing on PyPI (https://pypi.org -> Your projects ->
#      Publishing; create a pending publisher if the project does not exist yet):
#        Owner: salimfadhley · Repository: agent-inbox · Workflow: release.yaml
#        Environment: pypi
#   3. Push a tag (the version comes from it via hatch-vcs):
#        git tag v0.2.0 && git push origin v0.2.0
#
# With PUBLISH_PYPI unset, the build job still runs and uploads the wheel/sdist as
# workflow artifacts, so a release is always downloadable — it just is not pushed to
# PyPI.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for hatch-vcs version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    # Off unless explicitly opted in, so a plain tag push does not fail for want of the
    # one-time PyPI trusted-publisher setup.
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
